<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Mở đóng Modal</title>

    <style>
/*<!-- Reset ccs -->*/
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

input{
    display: none;
}

/* css nút mở modal, dùng relative để căn theo body、lệch khỏi vị trí cũ */
.open-btn{
    position: relative;
    margin-left: 50px;
    top: 70px;
    color: #ffffff;
    background-color: #3b82f6;
    padding: 10px 20px;
}
/* css nền phủ modal */
.overlay{
    /* dùng relative để căn theo body、lệch khỏi vị trí cũ */
    position: relative;
    top: 100px;
    background-color: rgba(0, 0, 0, 0.5);
    display: inline-block;
    width: calc(100% - 20px);
    height: 70vh;
    margin: 40px 10px ;
}

.modal{
    /*dùng absolute để căn theo class overlay */
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    margin: auto;

    width: 400px;
    height: 300px;


    background-color: #ffffff;
}

.close-btn{
    /*dùng absolute để căn theo class overlay */
    display: inline-block;
    background-color: #ef4444;
    position: absolute;
    width: 100px;
    /* cho height= line-height để căn giữa nội dung theo chiều ngang dọc trong thẻ label*/
    height: 40px;
    line-height: 40px;
    font-size: medium;
    text-align: center;
    bottom: 20px;
    left: 140px;

    color: #ffffff;

}

.content{
    /*dùng absolute để căn theo class overlay */
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    margin: auto;

    width: 200px;
    height: 100px;
    color: #333333;

}

    /* Logic active */
/* mặc định mở trang hộp modal ẩn,dùng vísibility để ẩn phẩn tử nhưng vẫn chiếm chỗ*/
.overlay{
    visibility: hidden;
}

/* nhấn nút thì mở modal, bấm nút, vùng tối, nút đóng thì tắt*/
#modal-toggle:checked ~ div .overlay{
    visibility: visible;
}

    </style>
</head>
<body>
<input type="checkbox" name="toast" id="modal-toggle">
<label class="open-btn" for="modal-toggle">Mở modal</label>
<div>
<!--   dùng label cùng trỏ chung về 1 checkbox để đóng nhiều cách -->
    <label class="overlay" for="modal-toggle" >
        <div class="modal">
           <label class="close-btn" for="modal-toggle">Đóng</label>
            <div class="content">Đây là nội dung thông báo!</div>
        </div>
    </label>
</div>

</body>
</html>
