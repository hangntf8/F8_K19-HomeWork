<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Trung tâm cấu hình giao diện</title>
</head>
<body>
<h1>Trung tâm cấu hình giao diện(Demo)</h1>
<!--KHU VỰC 1 - KHU ĐIỀU KHIỂN (phía trên):-->
<section>
<div>
    <p>Chọn giao diện(Theme):</p>

    <input type="radio" id="light" name="theme" value="light">
    <label for="light">Light</label>

    <input type="radio" id="dark" name="theme" value="dark">
    <label for="dark">Dark</label>
</div>

    <div>
        <p>chọn màu chủ đạo(Color):</p>

        <input type="radio" id="red" name="color" value="red">
        <label for="red">Red</label>

        <input type="radio" id="blue" name="color" value="blue">
        <label for="blue">Blue</label>

        <input type="radio" id="green" name="color" value="green">
        <label for="green">Green</label>
    </div>

    <div>
        <p>Chọn ngôn ngữ(Language):</p>

        <input type="radio" id="vietnamese" name="language" value="vietnamese">
        <label for="vietnamese">VI</label>

        <input type="radio" id="english" name="language" value="english">
        <label for="english">EN</label>
    </div>


    <div>
        <p>Tuỳ chọn bổ sung(Options - Checkbox):</p>

        <input type ="checkbox" id="advance" name="option[]" value="advance">
        <label for="advance">Hiển thị mô tả nâng cao</label>

        <input type ="checkbox" id="eco" name="option[]" value="eco">
        <label for="eco">Bật chế độ Eco</label>

        <input type ="checkbox" id="important" name="option[]" value="important">
        <label for="important">Hiển thị cảnh báo quan trọng</label>
    </div>

</section>

<!--KHU VỰC 2 - KHU MÔ TẢ KẾT QUẢ (phía dưới):-->
<section>

</section>


</body>
</html>
