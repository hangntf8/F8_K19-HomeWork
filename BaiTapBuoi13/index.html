<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Strips Hover Effect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
<!--   Khối bao phủ 5 strip -->
    <div class="container">
<!--        Relax strip -->
        <div class=" strip relax-strip">
            <div class="relax-title">Relax</div>
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=600&fit=crop" alt="relax image">
            <div class="overlay"></div>
        </div>

<!--       Explore strip -->
        <div class=" strip explore-strip">
            <div class="explore-title">Explore</div>
            <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&h=600&fit=crop" alt="explore image">
            <div class="overlay"></div>
        </div>

<!--       Travel strip -->
        <div class="strip travel-strip">
            <div class="travel-title">Travel</div>
            <img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=800&h=600&fit=crop" alt="travel image">
            <div class="overlay"></div>
        </div>

<!--       Achieve strip -->
        <div class="strip achieve-strip">
            <div class="achieve-title">Achieve</div>
            <img src="https://images.unsplash.com/photo-1484589065579-248aad0d8b13?w=800&h=600&fit=crop" alt="achieve image">
            <div class="overlay"></div>
        </div>

<!--       Dare strip -->
        <div class="strip dare-strip">
            <div class="dare-title">Dare</div>
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop" alt="dare image">
            <div class="overlay"></div>
        </div>

    </div>
</main>
</body>
</html>
